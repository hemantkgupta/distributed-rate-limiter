server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: distributed-rate-limiter
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

grpc:
  server:
    port: ${GRPC_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
